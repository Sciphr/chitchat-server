# ChitChat Server - Portainer Stack
#
# HOW TO DEPLOY:
#   1. In Portainer, go to Stacks > Add Stack
#   2. Paste this entire file into the Web editor
#   3. Update the values marked with  <-- CHANGE THIS  before deploying
#   4. Click "Deploy the stack"
#
# POST-DEPLOY STEPS:
#   - Log in to the ChitChat Admin UI and go to Admin → Security
#   - Enable "Trust Reverse Proxy" (required when running behind Nginx Proxy Manager)
#
# IMPORTANT: LIVEKIT_API_KEY and LIVEKIT_API_SECRET must be identical
# in BOTH the `chitchat` and `livekit` services below. Change them
# together, and use a long random string for each.

services:

  chitchat:
    image: sciphr/chitchat-server:latest
    restart: unless-stopped
    environment:
      PORT: "3001"
      DB_PATH: /app/data/chitchat.db
      DATA_DIR: /app/data

      # -- Authentication ---------------------------------------------------
      # Generate a strong secret, e.g.: openssl rand -hex 32
      JWT_SECRET: "change-me-to-a-long-random-secret"   # <-- CHANGE THIS

      # -- LiveKit (must match the livekit service below) -------------------
      # Set this to your public LiveKit URL (must be wss:// for HTTPS deployments).
      # IMPORTANT: This env var ALWAYS overrides the Admin UI setting on every
      # redeploy. If you change the URL in the Admin UI it will be reset when
      # you redeploy the stack. Either keep the correct URL here, or remove
      # this line entirely to manage the LiveKit URL from the Admin UI only.
      LIVEKIT_URL: "wss://livekit.example.com"           # <-- CHANGE THIS
      LIVEKIT_API_KEY: "devkey"                          # <-- CHANGE THIS
      LIVEKIT_API_SECRET: "devsecret"                    # <-- CHANGE THIS

      # -- Access control ---------------------------------------------------
      # For a public server set this to your URL, e.g. https://chat.example.com
      # Use * to allow all origins (fine for private/LAN installs)
      CORS_ALLOWED_ORIGINS: "*"
      CORS_ALLOW_NO_ORIGIN: "true"

      # -- Antivirus (ClamAV - disabled by default, see README for optional setup) --
      # FILES_AV_ENABLED: "true"
      # FILES_AV_PROVIDER: clamav
      # FILES_AV_CLAMAV_HOST: clamav
      # FILES_AV_CLAMAV_PORT: "3310"
      # FILES_AV_TIMEOUT_MS: "15000"
      # FILES_AV_FAIL_CLOSED: "true"

      # -- Optional: Password reset emails (SMTP) ---------------------------
      # SMTP_USER: you@example.com
      # SMTP_PASS: your-smtp-password
      # SMTP_FROM: you@example.com
      # SMTP_HOST: smtp.gmail.com
      # SMTP_PORT: "587"
      # SMTP_SECURE: "false"

      # -- Optional: GIF search via GIPHY -----------------------------------
      # GIPHY_ENABLED: "true"
      # GIPHY_API_KEY: your-giphy-api-key
      # GIPHY_RATING: pg
      # GIPHY_MAX_RESULTS: "20"

      # -- Optional: Strip EXIF data from uploaded images -------------------
      # FILES_STRIP_IMAGE_EXIF: "true"

    depends_on:
      - livekit
    ports:
      - "3001:3001"
    volumes:
      - chitchat_data:/app/data
      # Required only if antivirus is enabled and ClamAV is installed on the host.
      # This bind-mounts the host's ClamAV Unix socket into the container so
      # chitchat can reach it. Remove this line if you don't use ClamAV.
      - /run/clamav/clamd.ctl:/run/clamav/clamd.ctl

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    # --dev enables development mode (no TLS required); --bind 0.0.0.0 ensures
    # the server listens on all interfaces inside the container.
    # API keys are set via the LIVEKIT_KEYS env var below — no config file needed.
    command: --dev --bind 0.0.0.0
    environment:
      # Format is  "key: secret"  -- must match chitchat's LIVEKIT_API_KEY / LIVEKIT_API_SECRET above
      LIVEKIT_KEYS: "devkey: devsecret"                  # <-- CHANGE THIS

      # -- RTC port range (required for voice to work) ----------------------
      # This locks LiveKit to ports 50000-50100 so they match the Docker port
      # mapping above. Without this, LiveKit uses random ports that are
      # unreachable and voice connections will always fail.
      LIVEKIT_CONFIG: |
        rtc:
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true

        # -- TURN relay (optional, for users behind strict firewalls/NAT) ---
        # Requires a domain with a valid TLS certificate pointing to this server.
        # Uncomment and set your domain to enable:
        # turn:
        #   enabled: true
        #   domain: livekit.example.com
        #   tls_port: 5349
        #   udp_port: 3478
        #   external_tls: false
    ports:
      - "7880:7880/tcp"
      - "50000-50100:50000-50100/udp"
      - "3478:3478/udp"
      - "5349:5349/tcp"

volumes:
  chitchat_data:
