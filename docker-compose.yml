services:
  chitchat:
    image: sciphr/chitchat-server:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3001
      DB_PATH: /app/data/chitchat.db
      DATA_DIR: /app/data
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      FILES_AV_ENABLED: ${FILES_AV_ENABLED:-false}
      FILES_AV_PROVIDER: ${FILES_AV_PROVIDER:-clamav}
      FILES_AV_CLAMAV_HOST: ${FILES_AV_CLAMAV_HOST:-clamav}
      FILES_AV_CLAMAV_PORT: ${FILES_AV_CLAMAV_PORT:-3310}
      FILES_AV_TIMEOUT_MS: ${FILES_AV_TIMEOUT_MS:-15000}
      FILES_AV_FAIL_CLOSED: ${FILES_AV_FAIL_CLOSED:-true}
    depends_on:
      - livekit
    ports:
      - "${HOST_PORT:-3001}:3001"
    volumes:
      - chitchat_data:/app/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_PORT: ${LIVEKIT_PORT:-7880}
      LIVEKIT_UDP_PORT_START: ${LIVEKIT_UDP_PORT_START:-50000}
      LIVEKIT_UDP_PORT_END: ${LIVEKIT_UDP_PORT_END:-50100}
      # Set this to your LiveKit domain (e.g. rtc.yourdomain.com) to enable TURN relay.
      # TURN lets the Rust native client (screen share, native mic) punch through firewalls
      # when direct UDP is unavailable. Requires ports 3478/UDP and 5349/TCP to be open.
      LIVEKIT_TURN_DOMAIN: ${LIVEKIT_TURN_DOMAIN:-}
    command:
      - |
        set -eu
        RUNTIME_CFG=/tmp/livekit.yaml
        BASE_CFG=/etc/livekit-base.yaml
        DATA_CFG=/app/data/config.json

        extract_livekit_value() {
          key="$$1"
          if [ ! -r "$$DATA_CFG" ]; then
            return 0
          fi
          sed -n '/"livekit"[[:space:]]*:[[:space:]]*{/,/^[[:space:]]*}[,]*[[:space:]]*$$/p' "$$DATA_CFG" \
            | sed -n "s/.*\"$$key\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" \
            | head -n 1
        }

        if [ -f "$$BASE_CFG" ]; then
          awk '
            BEGIN { skip = 0 }
            /^[[:space:]]*keys:[[:space:]]*$$/ { skip = 1; next }
            skip && /^[^[:space:]]/ { skip = 0 }
            !skip { print }
          ' "$$BASE_CFG" > "$$RUNTIME_CFG"
        else
          cat > "$$RUNTIME_CFG" <<EOF
        port: $${LIVEKIT_PORT}
        bind_addresses:
          - "0.0.0.0"
        rtc:
          port_range_start: $${LIVEKIT_UDP_PORT_START}
          port_range_end: $${LIVEKIT_UDP_PORT_END}
          tcp_port: 7881
          use_external_ip: true
        logging:
          level: info
        EOF
        fi

        LK_API_KEY="$$(extract_livekit_value apiKey)"
        LK_API_SECRET="$$(extract_livekit_value apiSecret)"
        if [ -z "$$LK_API_KEY" ]; then LK_API_KEY="$${LIVEKIT_API_KEY:-}"; fi
        if [ -z "$$LK_API_SECRET" ]; then LK_API_SECRET="$${LIVEKIT_API_SECRET:-}"; fi

        if [ -n "$$LK_API_KEY" ] && [ -n "$$LK_API_SECRET" ]; then
          LK_API_KEY_ESCAPED="$$(printf '%s' "$$LK_API_KEY" | sed 's/[\"\\]/\\&/g')"
          LK_API_SECRET_ESCAPED="$$(printf '%s' "$$LK_API_SECRET" | sed 's/[\"\\]/\\&/g')"
          printf 'keys:\n  "%s": "%s"\n' "$$LK_API_KEY_ESCAPED" "$$LK_API_SECRET_ESCAPED" >> "$$RUNTIME_CFG"
        fi

        if [ -n "$${LIVEKIT_TURN_DOMAIN:-}" ]; then
          printf 'turn:\n  enabled: true\n  domain: "%s"\n  tls_port: 5349\n  udp_port: 3478\n  external_tls: false\n' \
            "$$LIVEKIT_TURN_DOMAIN" >> "$$RUNTIME_CFG"
        fi

        exec /livekit-server --config "$$RUNTIME_CFG"
    ports:
      - "${LIVEKIT_PORT:-7880}:7880/tcp"
      - "7881:7881/tcp"
      - "${LIVEKIT_UDP_PORT_START:-50000}-${LIVEKIT_UDP_PORT_END:-50100}:${LIVEKIT_UDP_PORT_START:-50000}-${LIVEKIT_UDP_PORT_END:-50100}/udp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
    volumes:
      - chitchat_data:/app/data
      - ./deploy/livekit/livekit.yaml:/etc/livekit-base.yaml:ro

volumes:
  chitchat_data:
